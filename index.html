<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripSplit | Holiday</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3284/3284614.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        :root {
            /* Blue Holiday Palette */
            --bg-top: #1e3c72;
            --bg-bottom: #2a5298;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #2980b9; 
            --primary-hover: #3498db;
            --secondary: #dff9fb; 
            --border: #bdc3c7;
            --danger: #e74c3c;
            --success: #00b894;
            --font: 'Outfit', sans-serif;
        }

        body { 
            font-family: var(--font); 
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed;
            color: var(--text-dark); 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            padding-bottom: env(safe-area-inset-bottom, 20px);
            overflow-x: hidden; 
        }

        /* --- Falling Money Effect --- */
        .money-flake {
            position: fixed;
            top: -10%;
            z-index: 9999;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite, sway ease-in-out infinite alternate;
        }

        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        @keyframes sway {
            0% { transform: translateX(0px) rotate(0deg); }
            100% { transform: translateX(25px) rotate(45deg); }
        }
        /* --------------------------- */

        h1 { 
            text-align: center; 
            font-weight: 700; 
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.25);
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        h2 { 
            font-weight: 600; 
            border-bottom: 2px solid var(--secondary); 
            padding-bottom: 8px; 
            margin-top: 0;
            color: var(--primary);
            font-size: 1.4em;
        }

        .card { 
            background-color: var(--card-bg); 
            border: none; 
            border-radius: 20px;
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 10;
        }

        /* --- Dashboard Summary Styles --- */
        .summary-total { text-align: center; font-size: 2em; font-weight: 700; color: var(--text-dark); margin: 10px 0 25px 0; }
        .summary-section-title { font-size: 1.1em; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 1em; font-weight: 500;}
        .summary-bar-container { width: 100%; background: #ecf0f1; border-radius: 8px; overflow: hidden; height: 10px; margin-bottom: 18px; }
        .summary-bar { height: 100%; background: var(--primary); border-radius: 8px; transition: width 0.5s ease-out; }
        .summary-bar.success { background: var(--success); }
        /* -------------------------------- */

        input[type="text"], input[type="number"], select { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0 15px 0; 
            background-color: #fff; 
            color: var(--text-dark); 
            border: 2px solid var(--border); 
            border-radius: 12px;
            font-family: var(--font);
            font-size: 1em;
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); 
        }

        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px;
            cursor: pointer; 
            font-weight: 600; 
            font-family: var(--font);
            font-size: 1.1em;
            padding: 14px;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        button.secondary { background-color: var(--text-muted); box-shadow: 0 4px 10px rgba(99, 110, 114, 0.2); margin-bottom: 20px; width: auto; padding: 10px 20px; font-size: 1em; }
        button.secondary:hover { background-color: var(--text-dark); }
        
        button.danger { background-color: transparent; color: var(--danger); border: 2px solid var(--danger); box-shadow: none; width: auto; padding: 6px 12px; margin-left: 5px; font-size: 0.9em;}
        button.danger:hover { background-color: var(--danger); color: white; }
        
        button.edit-btn { background-color: #74b9ff; color: #fff; box-shadow: none; width: auto; padding: 8px 14px; font-size: 0.9em; border-radius: 8px;}
        button.edit-btn:hover { background-color: #0984e3; }

        #copySettlementsBtn { background-color: var(--success); box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3); }
        #copySettlementsBtn:hover { background-color: #00A885; }

        ul { list-style-type: none; padding: 0; }
        li { padding: 15px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center;}
        li:last-child { border-bottom: none; }
        
        .trip-item { cursor: pointer; background: #fff; padding: 20px; border-radius: 16px; border: 2px solid transparent; margin-bottom: 15px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .trip-item:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1);}
        
        .settlement-amount { font-weight: 700; color: var(--text-dark); background: var(--secondary); padding: 6px 12px; border-radius: 20px;}
        
        .trip-header-actions { display: flex; justify-content: space-between; margin-bottom: 20px; position: relative; z-index: 10; }
        .trip-header-actions button { margin-bottom: 0; }

        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0 20px 0; padding: 15px; background: #f8f9fa; border-radius: 12px; border: 1px solid var(--border); }
        .checkbox-group label { display: flex; align-items: center; cursor: pointer; color: var(--text-dark); font-weight: 500;}
        .checkbox-group input { width: auto; margin: 0 10px 0 0; accent-color: var(--primary); transform: scale(1.2); }
        
        .view { display: none; }
        .active-view { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        #loadingMsg { text-align: center; color: white; font-weight: 600; margin-bottom: 20px; font-size: 1.1em; text-shadow: 0 2px 4px rgba(0,0,0,0.2);}
    </style>
</head>
<body>

    <h1>✈️ TripSplit ❄️</h1>

    <div id="dashboardView" class="view active-view">
        <div class="card">
            <h2>Start a New Journey</h2>
            <form id="newTripForm">
                <input type="text" id="tripName" placeholder="Where to? (e.g., Winter Getaway '26)" required autocomplete="off">
                <button type="submit">Let's Go 🌍</button>
            </form>
        </div>
        
        <h2 style="color: white; border-color: rgba(255,255,255,0.3);">Your Adventures</h2>
        <div id="loadingMsg">Packing the bags... ⏳</div>
        <div id="tripList"></div>
    </div>

    <div id="tripView" class="view">
        <div class="trip-header-actions">
            <button class="secondary" onclick="goBackToDashboard()">← Back</button>
            <button class="danger" onclick="deleteTrip()">Delete Trip 🗑️</button>
        </div>
        
        <div class="card" style="background: var(--primary); color: white; border-bottom: 4px solid var(--secondary);">
            <h2 id="currentTripTitle" style="margin-top: 0; border: none; color: white; text-align: center; font-size: 1.8em;"></h2>
        </div>

        <div class="card">
            <h2>1. Travel Buddies 👯</h2>
            <form id="addUserForm">
                <input type="text" id="userName" placeholder="Who's coming along?" required autocomplete="off">
                <button type="submit">Add Buddy</button>
            </form>
            <ul id="userList"></ul>
        </div>

        <div class="card">
            <h2 id="expenseFormTitle">2. Log an Expense 💸</h2>
            <form id="addExpenseForm">
                
                <select id="expenseCategory" required>
                    <option value="" disabled selected>-- Choose Category --</option>
                    <option value="✈️ Transport">✈️ Transport</option>
                    <option value="🏨 Accommodation">🏨 Accommodation</option>
                    <option value="🍽️ Food & Drinks">🍽️ Food & Drinks</option>
                    <option value="🎟️ Fun Stuff">🎟️ Fun Stuff</option>
                    <option value="🛒 Shopping">🛒 Shopping</option>
                    <option value="📦 Other">📦 Other</option>
                </select>

                <input type="text" id="expenseDesc" placeholder="What was it for?" required autocomplete="off">
                <input type="number" id="expenseAmount" placeholder="Amount ($)" step="0.01" required>
                <select id="expensePayer" required></select>
                
                <p style="margin: 15px 0 5px 0; color: var(--text-muted); font-size: 14px; font-weight: 600;">Who's chipping in?</p>
                <div id="involvedUsersContainer" class="checkbox-group"></div>

                <button type="submit" id="submitExpenseBtn">Save Expense</button>
                <button type="button" class="secondary" id="cancelEditBtn" style="display:none; width: 100%; margin-top: 8px;" onclick="cancelEdit()">Cancel Edit</button>
            </form>
        </div>

        <div class="card" id="analyticsDashboard">
            <h2>📊 Trip Summary</h2>
            <div id="totalSpentDisplay" class="summary-total">$0.00</div>
            
            <div class="summary-section-title">By Category</div>
            <div id="categorySummary"></div>
            
            <div class="summary-section-title" style="margin-top: 25px;">Individual Share</div>
            <div id="personSummary"></div>
        </div>

        <div class="card">
            <h2>3. Settle Up 🤝</h2>
            <ul id="settlementList"></ul>
            <button id="copySettlementsBtn" class="secondary" style="display:none; width: 100%; margin-top: 15px;" onclick="copySettlements()">📋 Copy for the Group Chat</button>
        </div>

        <div class="card">
            <h2>Expense History 📜</h2>
            <ul id="expenseLogList"></ul>
        </div>
    </div>

    <script>
        // --- FALLING MONEY SAKURA EFFECT ---
        function createMoney() {
            const money = document.createElement('div');
            money.classList.add('money-flake');
            const symbols = ['💸', '💵', '💳', '💰', '🪙'];
            money.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            money.style.left = Math.random() * 100 + 'vw';
            money.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
            const fallDuration = Math.random() * 4 + 5; 
            const swayDuration = Math.random() * 2 + 2; 
            money.style.animationDuration = `${fallDuration}s, ${swayDuration}s`;
            money.style.opacity = Math.random() * 0.6 + 0.4;
            document.body.appendChild(money);
            setTimeout(() => { money.remove(); }, fallDuration * 1000);
        }
        setInterval(createMoney, 350);

        // --- PWA SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        // --- STATE & CONFIG ---
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyXf27SbBGAib7DnywSkf7bh_ZIn_-Q-66O-mjV1SHJSC_UebMtyHbB_NccAq9yAZKT/exec";
        
        let trips = [];
        let activeTripId = null;
        let editingExpenseId = null;
        let currentSettlements = [];

        // --- DOM ELEMENTS ---
        const dashboardView = document.getElementById('dashboardView'), tripView = document.getElementById('tripView');
        const tripList = document.getElementById('tripList'), loadingMsg = document.getElementById('loadingMsg');
        const currentTripTitle = document.getElementById('currentTripTitle');
        const userList = document.getElementById('userList'), expensePayerSelect = document.getElementById('expensePayer');
        const involvedUsersContainer = document.getElementById('involvedUsersContainer');
        const settlementList = document.getElementById('settlementList'), expenseLogList = document.getElementById('expenseLogList');
        const expenseForm = document.getElementById('addExpenseForm'), submitExpenseBtn = document.getElementById('submitExpenseBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn'), expenseFormTitle = document.getElementById('expenseFormTitle');
        const copySettlementsBtn = document.getElementById('copySettlementsBtn');
        const categorySummary = document.getElementById('categorySummary'), personSummary = document.getElementById('personSummary'), totalSpentDisplay = document.getElementById('totalSpentDisplay');

        // --- GOOGLE SHEETS INTEGRATION ---
        async function loadDataFromGoogle() {
            try {
                const response = await fetch(GOOGLE_API_URL);
                trips = await response.json();
                loadingMsg.style.display = 'none';
                renderDashboard();
            } catch (error) {
                console.error("Error loading data:", error);
                loadingMsg.innerHTML = 'Uh oh! Failed to connect to Google Sheets.';
            }
        }

        async function saveData(tripToSave) {
            if (!tripToSave) return;
            try {
                await fetch(GOOGLE_API_URL, {
                    method: 'POST', redirect: 'follow',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'saveTrip', trip: tripToSave })
                });
            } catch (error) { console.error("Error saving data:", error); }
        }

        async function executeDeleteTrip(tripId) {
            try {
                await fetch(GOOGLE_API_URL, {
                    method: 'POST', redirect: 'follow',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'deleteTrip', tripId: tripId })
                });
            } catch (error) { console.error("Error deleting trip:", error); }
        }

        function getActiveTrip() { return trips.find(t => t.id === activeTripId); }

        // --- DASHBOARD & TRIP NAVIGATION ---
        function renderDashboard() {
            tripList.innerHTML = '';
            if (trips.length === 0) { tripList.innerHTML = '<p style="text-align:center; color:white;">No trips planned yet. Start one above!</p>'; return; }
            trips.forEach(trip => {
                const div = document.createElement('div'); div.className = 'trip-item';
                div.innerHTML = `<strong style="font-size: 1.2em; color: var(--primary);">${trip.name}</strong> <br><small style="color:var(--text-muted); font-weight:500;">${trip.users.length} buddies • ${trip.expenses.length} expenses</small>`;
                div.onclick = () => openTrip(trip.id); tripList.appendChild(div);
            });
        }

        document.getElementById('newTripForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const rawName = document.getElementById('tripName').value.trim();
            const formattedName = rawName.charAt(0).toUpperCase() + rawName.slice(1);
            const newTrip = { id: 'TRIP_' + Date.now().toString(), name: formattedName, users: [], expenses: [] };
            trips.push(newTrip); 
            document.getElementById('tripName').value = ''; 
            openTrip(newTrip.id);
            saveData(newTrip); 
        });

        function openTrip(id) { activeTripId = id; dashboardView.classList.remove('active-view'); tripView.classList.add('active-view'); cancelEdit(); renderTripDetails(); }
        function goBackToDashboard() { activeTripId = null; tripView.classList.remove('active-view'); dashboardView.classList.add('active-view'); renderDashboard(); }

        function deleteTrip() {
            if (!confirm("Are you sure you want to delete this trip? It's gone forever!")) return;
            const tripIdToDelete = activeTripId;
            trips = trips.filter(t => t.id !== activeTripId);
            goBackToDashboard();
            executeDeleteTrip(tripIdToDelete); 
        }

        // --- USER LOGIC ---
        document.getElementById('addUserForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const rawName = document.getElementById('userName').value.trim();
            const name = rawName.charAt(0).toUpperCase() + rawName.slice(1);
            const trip = getActiveTrip();
            if (name && !trip.users.includes(name)) { 
                trip.users.push(name); renderTripDetails(); 
                document.getElementById('userName').value = ''; saveData(trip); 
            }
        });

        function deleteUser(userName) {
            const trip = getActiveTrip();
            const hasExpenses = trip.expenses.some(exp => exp.payer === userName || (exp.involvedUsers && exp.involvedUsers.includes(userName)));
            if (hasExpenses) return alert(`Hold up! ${userName} is still tied to some expenses. Delete those first.`);
            if (!confirm(`Remove ${userName} from the trip?`)) return;
            trip.users = trip.users.filter(u => u !== userName);
            renderTripDetails(); saveData(trip);
        }

        // --- EXPENSE LOGIC ---
        expenseForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const trip = getActiveTrip();
            if (trip.users.length === 0) return alert("Hold up! Add some travel buddies first.");

            const checkboxes = document.querySelectorAll('input[name="involved"]:checked');
            const involvedUsers = Array.from(checkboxes).map(cb => cb.value);
            if(involvedUsers.length === 0) return alert("Select at least one person who is chipping in!");

            const category = document.getElementById('expenseCategory').value;
            const rawDesc = document.getElementById('expenseDesc').value.trim();
            const finalDesc = `[${category}] ${rawDesc}`;

            const expenseData = {
                id: editingExpenseId || 'EXP_' + Date.now().toString(),
                desc: finalDesc,
                amount: parseFloat(document.getElementById('expenseAmount').value),
                payer: document.getElementById('expensePayer').value,
                involvedUsers: involvedUsers
            };

            if (editingExpenseId) {
                const index = trip.expenses.findIndex(e => e.id === editingExpenseId);
                trip.expenses[index] = expenseData;
            } else { trip.expenses.push(expenseData); }

            cancelEdit(); renderTripDetails(); e.target.reset(); saveData(trip);
        });

        function deleteExpense(expenseId) {
            if(!confirm("Are you sure you want to delete this expense?")) return;
            const trip = getActiveTrip();
            trip.expenses = trip.expenses.filter(e => e.id !== expenseId);
            renderTripDetails(); saveData(trip);
        }

        function editExpense(expenseId) {
            const trip = getActiveTrip(); const exp = trip.expenses.find(e => e.id === expenseId);
            if(!exp) return;
            editingExpenseId = expenseId;
            
            const match = exp.desc.match(/^\[(.*?)\] (.*)$/);
            if (match) {
                document.getElementById('expenseCategory').value = match[1];
                document.getElementById('expenseDesc').value = match[2];
            } else {
                document.getElementById('expenseCategory').value = "📦 Other";
                document.getElementById('expenseDesc').value = exp.desc;
            }

            document.getElementById('expenseAmount').value = exp.amount;
            document.getElementById('expensePayer').value = exp.payer;

            const checkboxes = document.querySelectorAll('input[name="involved"]');
            checkboxes.forEach(cb => { cb.checked = exp.involvedUsers.includes(cb.value); });

            expenseFormTitle.textContent = "✏️ Edit Expense"; 
            submitExpenseBtn.textContent = "Update Expense";
            cancelEditBtn.style.display = "block";
            window.scrollTo({ top: document.getElementById('expenseFormTitle').offsetTop, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingExpenseId = null; expenseForm.reset();
            expenseFormTitle.textContent = "2. Log an Expense 💸"; 
            submitExpenseBtn.textContent = "Save Expense";
            cancelEditBtn.style.display = "none";
            document.querySelectorAll('input[name="involved"]').forEach(cb => cb.checked = true);
        }

        function copySettlements() {
            const trip = getActiveTrip();
            if(!trip || currentSettlements.length === 0) return;
            let text = `❄️ TripSplit: ${trip.name} ❄️\n------------------------\n`;
            currentSettlements.forEach(s => { text += `💸 ${s.from} owes ${s.to} $${s.amount.toFixed(2)}\n`; });
            text += `------------------------\nThanks for a great trip! ✈️✨`;

            navigator.clipboard.writeText(text).then(() => {
                const originalText = copySettlementsBtn.innerText;
                copySettlementsBtn.innerText = "✅ Copied to Clipboard!";
                setTimeout(() => { copySettlementsBtn.innerText = originalText; }, 2000);
            }).catch(err => { alert("Couldn't access clipboard."); });
        }

        // --- RENDER UI & CALCULATE DEBTS ---
        function renderTripDetails() {
            const trip = getActiveTrip(); if (!trip) return;

            currentTripTitle.textContent = `${trip.name}`;
            userList.innerHTML = ''; expensePayerSelect.innerHTML = '<option value="" disabled selected>-- Who paid? --</option>';
            involvedUsersContainer.innerHTML = ''; expenseLogList.innerHTML = '';
            
            // 1. Render Users
            trip.users.forEach(user => {
                userList.innerHTML += `<li><span style="font-weight: 600;">👤 ${user}</span><button class="danger" onclick="deleteUser('${user}')">X</button></li>`;
                expensePayerSelect.innerHTML += `<option value="${user}">${user}</option>`;
                involvedUsersContainer.innerHTML += `<label><input type="checkbox" name="involved" value="${user}" checked> ${user}</label>`;
            });

            // 2. Variables for Analytics
            let categoryTotals = {};
            let individualShare = {};
            let totalCost = 0;
            trip.users.forEach(u => individualShare[u] = 0);

            // 3. Render Expense Log & Build Analytics Data
            if (trip.expenses.length === 0) expenseLogList.innerHTML = '<li><em style="color:var(--text-muted);">No expenses yet. Let\'s spend some money!</em></li>';
            
            let balances = {};
            trip.users.forEach(u => balances[u] = 0);

            trip.expenses.forEach(exp => {
                const involved = exp.involvedUsers || trip.users; 
                const involvedCount = involved.length;
                
                // Log Display
                let displayDesc = exp.desc;
                let categoryName = "📦 Other";
                const match = displayDesc.match(/^\[(.*?)\] (.*)$/);
                if (match) { 
                    categoryName = match[1];
                    displayDesc = `<span style="color:var(--primary); font-size: 0.85em; font-weight: 600;">${match[1]}</span><br><span style="font-size: 1.1em; color:var(--text-dark);">${match[2]}</span>`; 
                } else if (displayDesc.match(/^\[(.*?)\]/)) {
                    categoryName = displayDesc.match(/^\[(.*?)\]/)[1];
                }

                expenseLogList.innerHTML += `
                    <li style="align-items: flex-start;">
                        <div><strong>${displayDesc}</strong> <br><span style="color:var(--success); font-weight: 700; font-size: 1.2em;">$${exp.amount.toFixed(2)}</span><br><small style="color:var(--text-muted); font-weight: 500;">Paid by ${exp.payer} (Split by ${involvedCount})</small></div>
                        <div style="display:flex; flex-direction:column; gap:8px;"><button class="edit-btn" onclick="editExpense('${exp.id}')">Edit</button><button class="danger" onclick="deleteExpense('${exp.id}')">Delete</button></div>
                    </li>`;

                // Analytics Calculation
                totalCost += exp.amount;
                categoryTotals[categoryName] = (categoryTotals[categoryName] || 0) + exp.amount;
                
                if(involvedCount > 0) {
                    const split = exp.amount / involvedCount;
                    balances[exp.payer] += exp.amount;
                    involved.forEach(u => {
                        balances[u] -= split;
                        individualShare[u] += split; // Track how much this person actually 'spent'
                    });
                }
            });

            // 4. Render Analytics Dashboard
            totalSpentDisplay.textContent = `$${totalCost.toFixed(2)}`;
            categorySummary.innerHTML = '';
            personSummary.innerHTML = '';

            if (totalCost === 0) {
                categorySummary.innerHTML = '<p style="color:var(--text-muted); font-size: 0.9em; text-align: center;">No data yet.</p>';
                personSummary.innerHTML = '<p style="color:var(--text-muted); font-size: 0.9em; text-align: center;">No data yet.</p>';
            } else {
                // Category Bars
                const sortedCats = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
                sortedCats.forEach(([cat, amt]) => {
                    const pct = (amt / totalCost) * 100;
                    categorySummary.innerHTML += `
                        <div class="summary-row"><span>${cat}</span> <strong>$${amt.toFixed(2)}</strong></div>
                        <div class="summary-bar-container"><div class="summary-bar" style="width: ${pct}%"></div></div>`;
                });

                // Person Share Bars
                const sortedPersons = Object.entries(individualShare).sort((a, b) => b[1] - a[1]);
                const maxShare = sortedPersons.length > 0 ? sortedPersons[0][1] : 1; // Used to scale bars relative to the highest spender
                sortedPersons.forEach(([person, amt]) => {
                    const pct = (amt / maxShare) * 100;
                    personSummary.innerHTML += `
                        <div class="summary-row"><span>👤 ${person}</span> <strong>$${amt.toFixed(2)}</strong></div>
                        <div class="summary-bar-container"><div class="summary-bar success" style="width: ${pct}%"></div></div>`;
                });
            }

            // 5. DEBT SIMPLIFICATION ALGORITHM
            let debtors = []; let creditors = [];
            for (const [user, balance] of Object.entries(balances)) {
                if (balance < -0.01) debtors.push({ user, amount: Math.abs(balance) });
                else if (balance > 0.01) creditors.push({ user, amount: balance });
            }
            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);

            currentSettlements = []; 
            let i = 0; let j = 0;
            while (i < debtors.length && j < creditors.length) {
                let debtor = debtors[i]; let creditor = creditors[j];
                let minAmount = Math.min(debtor.amount, creditor.amount);
                currentSettlements.push({ from: debtor.user, to: creditor.user, amount: minAmount });
                debtor.amount -= minAmount; creditor.amount -= minAmount;
                if (Math.abs(debtor.amount) < 0.01) i++;
                if (Math.abs(creditor.amount) < 0.01) j++;
            }

            // 6. Render Settlements to UI
            settlementList.innerHTML = '';
            copySettlementsBtn.style.display = 'none';

            if (currentSettlements.length === 0) {
                if (trip.expenses.length > 0) settlementList.innerHTML = '<li><em style="color:var(--success); font-weight: 600;">Everyone is fully settled up! 🎉</em></li>';
                else if (trip.users.length > 0) settlementList.innerHTML = '<li><em style="color:var(--text-muted);">No debts yet.</em></li>';
            } else {
                currentSettlements.forEach(s => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span><strong style="color:var(--danger);">${s.from}</strong> owes <strong style="color:var(--success);">${s.to}</strong></span> <span class="settlement-amount">$${s.amount.toFixed(2)}</span>`;
                    settlementList.appendChild(li);
                });
                copySettlementsBtn.style.display = 'block'; 
            }
        }

        // --- INIT ---
        loadDataFromGoogle();
    </script>
</body>
</html>
